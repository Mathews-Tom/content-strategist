spec_version: "0.1.0"
name: content-strategist
version: "1.0.0"
description: >
  Technical content creation and adaptation engine — transforms topics into
  channel-optimized content across LinkedIn posts, blog articles, HTML slide
  decks, and PDF reports from a single brief.
license: MIT

model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-sonnet-4-20250514
    - claude-haiku-4-20250414
  constraints:
    temperature: 0.4
    max_tokens: 16384

skills:
  - linkedin-post-style
  - humanize
  - html-presentation
  - md-to-pdf
  - tavily
  - youtube-analysis

runtime:
  max_turns: 50
  timeout: 600

tags:
  - content
  - writing
  - linkedin
  - blog
  - slides
  - pdf
  - multi-channel
  - marketing
